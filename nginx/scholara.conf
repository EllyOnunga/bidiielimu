# ─────────────────────────────────────────────
# Scholara — Production Reverse Proxy
# Handles tenant subdomain routing + SSL
# ─────────────────────────────────────────────

# Upstream services
upstream backend {
    server backend:8000;
    keepalive 64;
}

upstream frontend {
    server frontend:80;
}

# ─────────────────────────────────────────────
# Redirect HTTP → HTTPS
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name *.scholara.app scholara.app;
    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────
# HTTPS — Main App & Tenant Subdomains
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name *.scholara.app scholara.app;

    # SSL — use Let's Encrypt (certbot) certs
    ssl_certificate     /etc/letsencrypt/live/scholara.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scholara.app/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    # ── WebSocket (Django Channels) ──
    location /ws/ {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  86400;
    }

    # ── Django API ──
    location /api/ {
        proxy_pass          http://backend;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
    }

    # ── Django Admin ──
    location /admin/ {
        proxy_pass          http://backend;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Static Files (Django) ──
    location /static/ {
        alias /vol/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Media Files ──
    location /media/ {
        alias /vol/media/;
        expires 7d;
    }

    # ── React SPA (catch-all) ──
    location / {
        proxy_pass          http://frontend;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }
}
